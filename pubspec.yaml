name: neawstreamvplayer
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Reproducción de video
  media_kit: ^1.1.10
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # Utilidades y Persistencia
  shared_preferences: ^2.3.2
  wakelock_plus: ^1.1.4
  path_provider: ^2.1.4
  file_picker: ^12.0.0-beta.7
  lottie: ^3.1.2

  # Red y Permisos
  http: ^1.2.2
  permission_handler: ^12.0.3
  url_launcher: ^6.3.0
  media_kit_libs_android_video: ^1.3.8
  flutter_displaymode: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.1"
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/datos_curiosos.json

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
